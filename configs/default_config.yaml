# COMSOL2Neuromorphic Configuration

logging:
  level: "INFO"
  file_path: "logs/comsol2neuromorphic.log"
  console_output: true

comsol_parser:
  delimiter: null  # Auto-detect (whitespace, tab, comma)
  comment_char: "%"
  column_mapping:
    "time": ["t", "time", "Time (s)", "Time"]
    "voltage": ["v", "voltage", "V", "V_source", "V (V)", "Voltage (V)"]
    "current": ["i", "current", "I", "I_device", "I (A)", "Current (A)"]
    "state_var": ["w", "state", "gap", "w (nm)", "gap (nm)", "State"]
    "temperature": ["T", "temp", "temperature", "T (K)", "Temperature (K)"]

extraction:
  non_linearity_voltage: 1.0  # Voltage at which to calculate non-linearity ratio
  switching_threshold_current: 1.0e-5  # General threshold to identify LRS/HRS switching
  lrs_read_voltage: 0.1  # Voltage to read Low Resistance State
  hrs_read_voltage: 0.1  # Voltage to read High Resistance State
  set_threshold_current: 1.0e-5  # Specific current threshold for Vset
  reset_threshold_current: 1.0e-5  # Specific current threshold for Vreset

compact_model:
  type: "VTEAM"  # Options: VTEAM, Yakopcic, Simmons
  fitting:
    algorithm: "differential_evolution"
    max_iter: 500
    pop_size: 30
    tolerance: 1.0e-4
    loss_gamma: 0.3  # weight for linear current loss (1 - gamma is for log current loss)
    # Optimization bounds for VTEAM model fitting: [min, max]
    vteam_bounds:
      k_on: [-1000.0, -0.01]
      k_off: [0.01, 1000.0]
      alpha_on: [1.0, 5.0]
      alpha_off: [1.0, 5.0]
      v_on: [0.1, 2.0]
      v_off: [-2.0, -0.1]
      r_on: [100.0, 1.0e4]
      r_off: [1.0e4, 1.0e7]

  # Default parameters for VTEAM Model
  vteam:
    w_on: 0.0          # Conductive state (normalized state 0)
    w_off: 1.0         # Insulating state (normalized state 1)
    v_on: 0.8          # Positive Set threshold voltage (V)
    v_off: -0.8        # Negative Reset threshold voltage (V)
    k_on: -10.0        # Rate constant for Set (1/s)
    k_off: 10.0        # Rate constant for Reset (1/s)
    alpha_on: 3        # Exponent for Set voltage dependence
    alpha_off: 3       # Exponent for Reset voltage dependence
    r_on: 1000.0       # LRS resistance (Ohms)
    r_off: 100000.0    # HRS resistance (Ohms)
    d: 3.0e-9          # Scaling oxide thickness (m)
    p: 4               # Window function exponent

  # Default parameters for Yakopcic Model
  yakopcic:
    a1: 0.05
    a2: 0.05
    b: 0.5
    xp: 0.3
    xn: 0.5
    gp: 10.0
    gn: 10.0
    ap: 0.1
    an: 0.1
    eta: 1.0

  # Default parameters for Simmons Tunneling Barrier Model
  simmons:
    w_on: 1.0e-10        # Minimum gap distance (m)
    w_off: 1.5e-9      # Maximum gap distance (m)
    tox: 3.0e-9          # Total oxide thickness (m)
    phi_0: 0.95        # Electron barrier height (eV)
    area: 1.0e-12        # Contact area (m^2)
    k_on: -1.0e-9        # State migration coefficient for Set (m/s)
    k_off: 1.0e-9        # State migration coefficient for Reset (m/s)
    v_on: 0.6          # Set voltage threshold (V)
    v_off: -0.6         # Reset voltage threshold (V)

# Hardware-aware device configurations
device:
  d2d:
    enabled: true
    # Mapping parameter names to distribution and variation coefficient (relative standard deviation)
    # Using lognormal for resistances (strictly positive) and gaussian for thresholds / rates.
    parameters:
      r_on: { dist: "lognormal", std: 0.15 }
      r_off: { dist: "lognormal", std: 0.15 }
      v_on: { dist: "gaussian", std: 0.05 }
      v_off: { dist: "gaussian", std: 0.05 }
      k_on: { dist: "gaussian", std: 0.1 }
      k_off: { dist: "gaussian", std: 0.1 }
  
  c2c:
    enabled: true
    # State diffusion noise coefficient (absolute standard deviation scaled by sqrt(dt))
    state_noise_std: 0.02
    # Dynamic parameter fluctuations
    parameter_noise_std: 0.01

  drift:
    enabled: true
    # Drift exponent nu (positive makes resistance drift up, conductance drift down)
    coeff: 0.05
    # Reference time t_zero (seconds)
    t_zero: 1.0
    # Drift target type: "resistance" or "state"
    type: "resistance"
    # Programming voltage threshold: above this voltage, drift tracking is reset (V)
    programming_threshold: 0.5

  noise:
    thermal: true
    shot: true
    bandwidth: 1.0e6  # 1 MHz
    generic_std: 0.0   # generic current noise floor in Amperes
    temperature: 300.0 # Kelvin

crossbar:
  size: [64, 64]
  line_resistance: 1.5  # ohms per segment
  source_resistance: 100.0  # ohms
  load_resistance: 100.0  # ohms
  parasitic_capacitance: 1.0e-15  # Farads
  mna_tolerance: 1.0e-6

snn:
  neuron_model: "LIF"
  time_step: 1.0e-3  # s
  threshold: 1.0
  leak_constant: 0.95
  refractory_period: 2.0e-3  # s

plasticity:
  stdp:
    a_plus: 0.05       # Amplitude of potentiation (relative conductance change)
    a_minus: 0.03      # Amplitude of depression (relative conductance change)
    tau_plus: 20.0e-3  # Potentiation decay time constant (s)
    tau_minus: 20.0e-3 # Depression decay time constant (s)
    update_type: "multiplicative" # Options: additive, multiplicative
    
    # Pulse-based physical STDP settings
    pulse_based:
      v_pre_amp: 1.2      # Amplitude of pre-synaptic pulse (V)
      v_post_amp: 1.2     # Amplitude of post-synaptic pulse (V)
      tau_pulse: 15.0e-3  # Pulse decay time constant (s)
      pulse_duration: 50.0e-3 # Pulse duration simulated (s)

